---
layout: default
---
<section class="page-shell">
  <div class="container narrow">
    <article class="card page-card">
      <header class="page-header">
        <h1>{{ page.title }}</h1>
        {% if page.intro %}
        <p class="page-intro">{{ page.intro }}</p>
        {% endif %}
      </header>
      <div class="page-content prose">
        {{ content }}
      </div>
    </article>
  </div>
</section>
