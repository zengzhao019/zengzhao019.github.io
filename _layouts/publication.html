---
layout: default
---
<section class="page-shell">
  <div class="container narrow">
    <article class="card page-card">
      <header class="page-header">
        <div class="eyebrow">Publication</div>
        <h1>{{ page.title }}</h1>
        <p class="page-intro">{{ page.authors }}{% if page.venue %} · <em>{{ page.venue }}</em>{% endif %}{% if page.year %} · {{ page.year }}{% endif %}</p>
      </header>
      <div class="page-content prose">
        {{ content }}
        <div class="pub-links standalone">
          {% if page.paperurl %}<a href="{{ page.paperurl }}" target="_blank" rel="noreferrer">DOI</a>{% endif %}
          {% if page.arxiv %}<a href="{{ page.arxiv }}" target="_blank" rel="noreferrer">arXiv</a>{% endif %}
        </div>
      </div>
    </article>
  </div>
</section>
